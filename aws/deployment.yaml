# hello-world-gitops/aws/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: app
          # Replace with your actual ECR repository URL
          image: 380821404406.dkr.ecr.eu-west-2.amazonaws.com/ken-eks-cluster-app-repo:63ed45b
          ports:
            - containerPort: 5000